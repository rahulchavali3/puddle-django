{% extends 'core/base.html' %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<div class="bg-slate-50 min-h-screen py-10">
    <div class="max-w-7xl mx-auto px-6">

        <div class="bg-white rounded-2xl shadow-lg p-8">

            <h1 class="text-4xl font-bold text-slate-800 text-center mb-10">
                My Items
            </h1>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">

                {% for item in items %}

                <a
                    href="{% url 'item:detail' item.id %}"
                    class="group bg-white rounded-2xl overflow-hidden border border-slate-100 shadow-md hover:shadow-2xl hover:-translate-y-1 transition duration-300"
                >

                    <div class="overflow-hidden bg-slate-100">

                        <img
                            src="{{ item.image.url }}"
                            class="w-full h-64 object-cover group-hover:scale-105 transition duration-500"
                        >

                    </div>

                    <div class="p-6">

                        <h2 class="text-xl font-bold text-slate-800 group-hover:text-teal-600 transition">
                            {{ item.name }}
                        </h2>

                        <p class="mt-3 text-lg font-semibold text-teal-600">
                            ₹{{ item.price }}
                        </p>

                    </div>

                </a>

                {% endfor %}

            </div>

        </div>

    </div>
</div>

{% endblock %}
