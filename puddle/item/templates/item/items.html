{% extends 'core/base.html' %}

{% block title %}Items{% endblock %}

{% block content %}
<div class="bg-slate-50 min-h-screen py-10">
    <div class="max-w-7xl mx-auto px-6">

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">

            <!-- Sidebar -->
            <div class="lg:col-span-1">

                <div class="bg-white rounded-2xl shadow-lg p-6 sticky top-6">

                    <form method="get" action="{% url 'item:items' %}">
                        <input
                            name="query"
                            type="text"
                            value="{{ query }}"
                            placeholder="Find a bike, chair or car..."
                            class="w-full px-5 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500"
                        >

                        <button class="w-full mt-4 py-3 bg-teal-600 hover:bg-teal-700 text-white rounded-xl font-semibold transition duration-300">
                            Search
                        </button>
                    </form>

                    <hr class="my-8">

                    <h3 class="text-lg font-bold text-slate-700 mb-4">
                        Categories
                    </h3>

                    <ul class="space-y-2">
                        {% for category in categories %}
                            <li>
                                <a
                                    href="{% url 'item:items' %}?query={{ query }}&category={{ category.id }}"
                                    class="block px-4 py-3 rounded-xl transition duration-300
                                    {% if category.id == category_id %}
                                        bg-teal-600 text-white shadow
                                    {% else %}
                                        hover:bg-teal-50 hover:text-teal-700 text-slate-700
                                    {% endif %}"
                                >
                                    {{ category.name }}
                                </a>
                            </li>
                        {% endfor %}
                    </ul>

                    <hr class="my-8">

                    <a
                        href="{% url 'item:items' %}"
                        class="block text-center py-3 bg-yellow-500 hover:bg-yellow-600 text-white rounded-xl font-semibold transition duration-300"
                    >
                        Clear Filters
                    </a>

                </div>

            </div>

            <!-- Items -->
            <div class="lg:col-span-3">

                <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-8">

                    {% for item in items %}
                        <a
                            href="{% url 'item:detail' item.id %}"
                            class="group bg-white rounded-2xl overflow-hidden shadow-md hover:shadow-2xl transition duration-300 hover:-translate-y-1"
                        >

                            <div class="overflow-hidden">
                                <img
                                    src="{{ item.image.url }}"
                                    class="w-full h-60 object-cover group-hover:scale-105 transition duration-500"
                                >
                            </div>

                            <div class="p-6">

                                <h2 class="text-xl font-bold text-slate-800 group-hover:text-teal-600 transition">
                                    {{ item.name }}
                                </h2>

                                <p class="mt-3 text-lg font-semibold text-teal-600">
                                    ₹{{ item.price }}
                                </p>

                            </div>

                        </a>
                    {% endfor %}

                </div>

            </div>

        </div>

    </div>
</div>
{% endblock %}
